<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAgMaO2FIL1JMWJaMtqXkzkUc-QDEqhL7Q",
    authDomain: "moonlight-xmaz.firebaseapp.com",
    projectId: "moonlight-xmaz",
    storageBucket: "moonlight-xmaz.firebasestorage.app",
    messagingSenderId: "362546181160",
    appId: "1:362546181160:web:8a8a2383af513f1251711d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveToCloud = async () => {
    const data = document.getElementById('knowledgeBase').value;
    const saveBtn = document.getElementById('saveBtn');
    if(!data.trim()) return alert("အချက်အလက် အရင်ဖြည့်ပါ။");
    saveBtn.innerText = "⏳ သိမ်းနေသည်...";
    try {
      await setDoc(doc(db, "settings", "knowledge"), { content: data, updatedAt: new Date().toISOString() });
      alert("✅ Cloud မှာ အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ!");
    } catch (e) { alert("Error: " + e.message); }
    saveBtn.innerText = "☁️ Save to Cloud";
  };

  onSnapshot(doc(db, "settings", "knowledge"), (docSnap) => {
    if (docSnap.exists()) document.getElementById('knowledgeBase').value = docSnap.data().content;
  });
</script>

<script>
const GROQ_KEY = "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";
let clicks = 0, timer;

function secretClick() {
  clicks++; clearTimeout(timer);
  if(clicks === 3) {
    checkPassword();
    clicks = 0;
  }
  timer = setTimeout(() => clicks = 0, 1000);
}

function checkPassword() {
  // Browser standard prompts are not ideal in frames, but for simplicity here:
  // We'll use a custom prompt if we had more files, but simple prompt for now
  const pass = prompt("Admin Password ကို ရိုက်ထည့်ပါ:");
  if (pass === "2006") {
    toggleAdmin();
  } else if (pass !== null) {
    alert("Password မှားယွင်းနေပါသည်။ Access Denied!");
  }
}

function toggleAdmin() { document.getElementById('adminDashboard').classList.toggle('open'); }

function addMessage(role, text) {
  const box = document.getElementById('chatbox');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerText = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function quickAsk(q) {
  document.getElementById('userInput').value = q;
  handleSend();
}

async function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  const kb = document.getElementById('knowledgeBase').value;
  if(!text) return;

  addMessage("user", text);
  input.value = '';
  
  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          { role: "system", content: `သင်သည် Diamond Gaming မှ Support ဖြစ်သည်။ အောက်ပါအချက်အလက်များကိုသာ သုံး၍ မြန်မာလို ယဉ်ကျေးစွာ ဖြေပေးပါ။ \n\n ${kb}` },
          { role: "user", content: text }
        ]
      })
    });
    const data = await response.json();
    addMessage("bot", data.choices[0].message.content);
  } catch (e) { addMessage("bot", "ချိတ်ဆက်မှု အခက်အခဲရှိနေပါသည်။"); }
}

window.onload = () => addMessage("bot", "မင်္ဂလာပါ! Diamond Gaming Support မှ ကြိုဆိုပါတယ်။ Password ခံထားပြီးပါပြီ။");
</script>
