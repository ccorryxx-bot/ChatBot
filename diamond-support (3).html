<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diamond Support - Secure Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;600;700;800&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAgMaO2FIL1JMWJaMtqXkzkUc-QDEqhL7Q",
    authDomain: "moonlight-xmaz.firebaseapp.com",
    projectId: "moonlight-xmaz",
    storageBucket: "moonlight-xmaz.firebasestorage.app",
    messagingSenderId: "362546181160",
    appId: "1:362546181160:web:8a8a2383af513f1251711d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.saveToCloud = async () => {
    const data = document.getElementById('knowledgeBase').value;
    const saveBtn = document.getElementById('saveBtn');
    if (!data.trim()) return alert("အချက်အလက် အရင်ဖြည့်ပါ။");
    const oldText = saveBtn.innerText;
    saveBtn.innerText = "⏳ သိမ်းနေသည်...";
    saveBtn.disabled = true;
    try {
      await setDoc(doc(db, "settings", "knowledge"), {
        content: data,
        updatedAt: new Date().toISOString()
      });
      alert("✅ Cloud မှာ အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ!");
    } catch (e) {
      alert("Error: " + e.message);
    }
    saveBtn.innerText = oldText;
    saveBtn.disabled = false;
  };

  onSnapshot(doc(db, "settings", "knowledge"), (docSnap) => {
    if (docSnap.exists()) {
      document.getElementById('knowledgeBase').value = docSnap.data().content;
    }
  });
</script>

<style>
  :root {
    --bg:       #06080f;
    --bg2:      #0b0e1a;
    --surface:  rgba(11,15,26,0.82);
    --border:   rgba(255,255,255,0.07);
    --text:     #eef2ff;
    --muted:    rgba(200,210,240,0.60);
    --p1:       #6366f1;
    --p2:       #818cf8;
    --acc:      #38bdf8;
    --gem:      #f472b6;
    --success:  #34d399;
    --glow-p:   rgba(99,102,241,0.30);
    --glow-a:   rgba(56,189,248,0.20);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { height:100%; height:-webkit-fill-available; }
  body {
    height:100vh;
    height:100dvh;
    display:flex;
    justify-content:center;
    background:
      radial-gradient(ellipse 70% 50% at 50% -10%, rgba(99,102,241,0.22), transparent),
      radial-gradient(ellipse 40% 30% at 10% 60%, rgba(56,189,248,0.10), transparent),
      radial-gradient(ellipse 40% 30% at 90% 70%, rgba(244,114,182,0.10), transparent),
      linear-gradient(170deg, #07091a 0%, #06080f 100%);
    color:var(--text);
    overflow:hidden;
    font-family:'DM Sans','Noto Sans Myanmar',sans-serif;
  }

  /* Subtle noise overlay */
  body::after {
    content:"";
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 180px;
    opacity:0.45;
    pointer-events:none;
    z-index:0;
  }

  /* Grid lines */
  body::before {
    content:"";
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
    background-size:48px 48px;
    mask-image:linear-gradient(180deg, rgba(0,0,0,0.5), transparent 80%);

    z-index:0;
  }

  /* ── Admin Panel ── */
  #adminDashboard {
    position:fixed;
    top:0; left:-100%;
    width:100%; max-width:380px;
    height:100%;
    z-index:1000;
    padding:28px 24px;
    display:flex;
    flex-direction:column;
    gap:16px;
    background:linear-gradient(180deg, rgba(10,12,24,0.98), rgba(7,9,18,0.99));
    border-right:1px solid rgba(99,102,241,0.18);
    box-shadow:20px 0 60px rgba(0,0,0,0.55);
    transition:left 0.40s cubic-bezier(0.4,0,0.2,1);
    backdrop-filter:blur(24px);
  }
  #adminDashboard.open { left:0; }

  .panel-top { display:flex; align-items:center; justify-content:space-between; }
  .panel-close {
    cursor:pointer; color:var(--muted); font-size:12px; font-weight:700;
    letter-spacing:0.5px; transition:0.2s;
    font-family:'Syne',sans-serif;
  }
  .panel-close:hover { color:#fff; transform:translateX(-2px); }
  .panel-title { font-size:17px; font-weight:800; color:#fff; font-family:'Syne',sans-serif; }
  .panel-badge {
    display:inline-flex; align-items:center; gap:8px;
    padding:7px 14px; border-radius:999px;
    background:rgba(52,211,153,0.08);
    border:1px solid rgba(52,211,153,0.18);
    color:#6ee7b7; font-size:11px; font-weight:700; letter-spacing:0.5px;
  }
  .panel-badge::before {
    content:""; width:6px; height:6px; border-radius:50%;
    background:#34d399; box-shadow:0 0 6px #34d399;
    animation:pulse 2s ease infinite;
  }
  .panel-label { font-size:11px; color:var(--muted); font-weight:600; letter-spacing:0.3px; margin-top:2px; }

  textarea {
    flex:1; width:100%;
    background:rgba(0,0,0,0.35);
    border:1px solid rgba(99,102,241,0.20);
    border-radius:16px;
    color:#a5f3a0;
    padding:16px; resize:none; outline:none;
    font-size:13px; line-height:1.75;
    font-family:'DM Sans','Noto Sans Myanmar',sans-serif;
    transition:0.2s;
  }
  textarea:focus {
    border-color:rgba(56,189,248,0.45);
    box-shadow:0 0 0 4px rgba(56,189,248,0.08);
  }

  /* ── Main Container ── */
  .container {
    width:100%; max-width:560px;
    height:100vh;
    height:100dvh;
    display:flex; flex-direction:column;
    background:var(--surface);
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
    backdrop-filter:blur(28px);
    position:relative;
    z-index:1;
    box-shadow:0 0 80px rgba(0,0,0,0.50);
    overflow:hidden;
  }

  .container::before {
    content:"";
    position:absolute;
    top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(99,102,241,0.5),rgba(56,189,248,0.5),transparent);
    pointer-events:none;
  }

  /* ── Header ── */
  .header {
    padding:18px 20px 16px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
    position:relative; flex-shrink:0;
  }
  .brand { display:flex; align-items:center; gap:13px; }
  .icon-box {
    width:48px; height:48px; border-radius:14px;
    background:linear-gradient(135deg, #6366f1, #818cf8);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:20px;
    box-shadow:0 8px 24px rgba(99,102,241,0.35), 0 0 0 1px rgba(255,255,255,0.07) inset;
    transition:0.2s ease; position:relative; overflow:hidden;
  }
  .icon-box::after {
    content:""; position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    pointer-events:none;
  }
  .icon-box:hover { transform:translateY(-1px) scale(1.04); box-shadow:0 12px 30px rgba(99,102,241,0.45); }
  .icon-box:active { transform:scale(0.97); }

  .brand-copy h2 {
    font-size:17px; font-weight:800;
    font-family:'Syne',sans-serif; letter-spacing:0.3px;
    background:linear-gradient(90deg, #fff 0%, #e0d7ff 30%, #a78bfa 60%, #f472b6 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 8px rgba(167,139,250,0.5));
    animation:titleShimmer 3s ease infinite;
    background-size:200% auto;
  }
  @keyframes titleShimmer {
    0%   { background-position: 0% center; }
    50%  { background-position: 100% center; }
    100% { background-position: 0% center; }
  }
  .status-row {
    display:flex; align-items:center; gap:6px; margin-top:4px;
  }
  .status-dot {
    width:6px; height:6px; border-radius:50%; background:var(--success);
    box-shadow:0 0 6px var(--success); animation:pulse 2.2s ease infinite;
  }
  .status-text { font-size:10px; color:var(--success); font-weight:700; letter-spacing:1px; }

  .header-right { display:flex; align-items:center; gap:10px; }

  /* Premium live widget */
  .live-widget {
    display:flex; flex-direction:column; align-items:flex-end; gap:4px;
  }
  .live-top {
    display:flex; align-items:center; gap:6px;
  }
  .live-pill {
    display:flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:999px;
    background:linear-gradient(135deg, rgba(251,191,36,0.12), rgba(245,158,11,0.08));
    border:1px solid rgba(251,191,36,0.25);
    font-size:10px; font-weight:800; color:#fcd34d;
    letter-spacing:1px; font-family:'Syne',sans-serif;
  }
  .live-pill::before {
    content:""; width:5px; height:5px; border-radius:50%;
    background:#fbbf24; box-shadow:0 0 6px #fbbf24;
    animation:pulse 1.5s ease infinite;
  }
  .online-count {
    font-size:10px; color:rgba(200,210,240,0.55); font-weight:600;
    letter-spacing:0.3px;
  }
  .online-count span { color:#34d399; font-weight:700; }

  /* ── Chat ── */
  .chatbox {
    flex:1; overflow-y:auto; padding:20px;
    display:flex; flex-direction:column; gap:4px;
    scrollbar-width:none; scroll-behavior:smooth;
  }
  .chatbox::-webkit-scrollbar { display:none; }

  /* Row wrapper for bot (emoji + bubble) */
  .bot-row {
    display:flex; align-items:flex-end; gap:8px;
    align-self:flex-start; max-width:88%;
    animation:msgIn 0.20s cubic-bezier(0.34,1.56,0.64,1);
  }
  .bot-avatar {
    width:30px; height:30px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg,#6366f1,#a78bfa);
    display:flex; align-items:center; justify-content:center;
    font-size:14px;
    box-shadow:0 4px 12px rgba(99,102,241,0.35);
    margin-bottom:18px; /* pushes up to align with bubble bottom */
  }
  .bot-col { display:flex; flex-direction:column; gap:4px; }

  .message {
    max-width:100%;
    padding:12px 16px;
    border-radius:18px;
    font-size:14px; line-height:1.75; letter-spacing:0.1px;
    word-break:break-word; white-space:pre-wrap;
    position:relative;
  }
  .bot {
    background:linear-gradient(135deg, rgba(30,27,60,0.95), rgba(20,20,45,0.95));
    border:1px solid rgba(139,92,246,0.22);
    box-shadow:0 4px 20px rgba(99,102,241,0.15), 0 0 0 1px rgba(255,255,255,0.03) inset;
    border-bottom-left-radius:5px;

  }
  .user {
    align-self:flex-end;
    background:linear-gradient(135deg, #6366f1, #818cf8);
    color:#fff;
    box-shadow:0 8px 24px rgba(99,102,241,0.28), 0 0 0 1px rgba(255,255,255,0.08) inset;
    border-bottom-right-radius:5px;
    max-width:84%;
    animation:msgIn 0.20s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* Timestamp */
  .msg-time {
    font-size:10px; color:rgba(200,210,240,0.38);
    font-weight:500; letter-spacing:0.3px;
    padding:0 4px;
  }
  .bot-col .msg-time { align-self:flex-start; }
  .user-wrap { display:flex; flex-direction:column; gap:4px; align-self:flex-end; align-items:flex-end; animation:msgIn 0.20s cubic-bezier(0.34,1.56,0.64,1); }
  .user-wrap .msg-time { align-self:flex-end; }

  /* Typewriter cursor */
  .typing-cursor::after {
    content:"|";
    animation:blink 0.7s step-end infinite;
    color:var(--acc); font-weight:300; margin-left:1px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* URL link style inside messages */
  .message a {
    color:var(--acc);
    text-decoration:underline;
    text-underline-offset:3px;
    text-decoration-color:rgba(56,189,248,0.45);
    word-break:break-all;
    cursor:pointer;
    font-weight:500;
    transition:color 0.15s;
  }
  .message a:hover { color:#7dd3fc; }

  /* ── Quick Actions ── */
  .quick-actions {
    padding:10px 18px 10px;
    display:flex; gap:8px; overflow-x:auto;
    scrollbar-width:none;
    border-top:1px solid rgba(255,255,255,0.04);
    border-bottom:1px solid rgba(255,255,255,0.04);
    background:rgba(0,0,0,0.18);
    flex-shrink:0;
  }
  .quick-actions::-webkit-scrollbar { display:none; }
  .q-btn {
    white-space:nowrap; flex-shrink:0;
    padding:9px 14px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:999px;
    color:var(--text); font-size:12px; font-weight:600;
    cursor:pointer; font-family:'DM Sans','Noto Sans Myanmar',sans-serif;
    transition:0.18s ease;
  }
  .q-btn:hover {
    background:rgba(99,102,241,0.12);
    border-color:rgba(99,102,241,0.35);
    transform:translateY(-1px);
    box-shadow:0 6px 18px rgba(99,102,241,0.15);
  }
  .q-btn:active { transform:translateY(1px); }

  /* ── Footer / Input ── */
  .footer {
    padding:14px 16px 18px;
    border-top:1px solid var(--border);
    display:flex; gap:10px; align-items:center;
    background:rgba(6,8,15,0.70);
    flex-shrink:0;
    position:sticky;
    bottom:0;
    z-index:10;
  }
  .input-wrap { flex:1; position:relative; }
  .input-glow {
    position:absolute; inset:-1px; border-radius:999px;
    background:linear-gradient(90deg, rgba(56,189,248,0.3), rgba(99,102,241,0.4), rgba(244,114,182,0.25));
    border-radius:999px; padding:1px;
    mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask-composite:xor; pointer-events:none; opacity:0.5;
  }
  input {
    width:100%;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:999px;
    padding:12px 18px;
    color:#fff; outline:none; font-size:14px;
    font-family:'DM Sans','Noto Sans Myanmar',sans-serif;
    transition:0.2s ease;
  }
  input::placeholder { color:rgba(200,210,240,0.40); }
  input:focus {
    border-color:rgba(56,189,248,0.38);
    box-shadow:0 0 0 4px rgba(56,189,248,0.08);
    background:rgba(255,255,255,0.06);
  }

  .send-btn {
    width:48px; height:48px; border-radius:50%; border:none;
    background:linear-gradient(135deg, var(--p1), #a78bfa);
    color:#fff; font-size:15px; cursor:pointer;
    box-shadow:0 8px 22px rgba(99,102,241,0.35), 0 0 0 1px rgba(255,255,255,0.08) inset;
    transition:0.18s ease; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .send-btn:hover { transform:translateY(-1px) scale(1.04); filter:brightness(1.08); }
  .send-btn:active { transform:scale(0.96); }

  #saveBtn {
    padding:14px 16px;
    background:linear-gradient(135deg, var(--p1), #a78bfa);
    border:none; border-radius:14px; color:#fff;
    font-weight:700; font-size:13px; cursor:pointer;
    font-family:'Syne',sans-serif; letter-spacing:0.3px;
    box-shadow:0 10px 28px rgba(99,102,241,0.25);
    transition:0.18s ease;
  }
  #saveBtn:hover { filter:brightness(1.08); transform:translateY(-1px); }
  #saveBtn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

  /* ── Thinking indicator ── */
  .thinking {
    align-self:flex-start;
    display:flex; align-items:center; gap:5px;
    padding:12px 16px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px; border-bottom-left-radius:5px;
    animation:msgIn 0.20s ease;
  }
  .thinking span {
    width:7px; height:7px; border-radius:50%;
    background:rgba(99,102,241,0.7);
    animation:dotPulse 1.2s ease infinite;
  }
  .thinking span:nth-child(2) { animation-delay:0.2s; }
  .thinking span:nth-child(3) { animation-delay:0.4s; }

  @keyframes dotPulse {
    0%,80%,100% { transform:scale(0.7); opacity:0.4; }
    40% { transform:scale(1); opacity:1; }
  }
  @keyframes msgIn {
    from { transform:translateY(8px) scale(0.97); opacity:0; }
    to   { transform:translateY(0) scale(1); opacity:1; }
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.45; }
  }

  @media (max-width:640px) {
    .container { max-width:100%; border:none; }
    #adminDashboard { max-width:100%; }
    .message { max-width:90%; }
  }
</style>
</head>
<body>

<!-- Admin Panel -->
<div id="adminDashboard">
  <div class="panel-top">
    <div class="panel-close" onclick="toggleAdmin()">✕ CLOSE</div>
  </div>
  <div class="panel-badge">Secure Admin Panel</div>
  <div>
    <h2 class="panel-title">Knowledge Base</h2>
    <div class="panel-label">အချက်အလက်များ ဒီမှာ ရေးထည့်ပါ...</div>
  </div>
  <textarea id="knowledgeBase" placeholder="အချက်အလက်များ ဒီမှာ ရေးထည့်ပါ..."></textarea>
  <button id="saveBtn" onclick="saveToCloud()">☁️ Save to Cloud</button>
</div>

<!-- Main Chat Container -->
<div class="container">
  <div class="header">
    <div class="brand">
      <div class="icon-box" onclick="secretClick()">🎮</div>
      <div class="brand-copy">
        <h2>Diamond Gaming</h2>
        <div class="status-row">
          <div class="status-dot"></div>
          <span class="status-text">ONLINE · SECURE</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-widget">
        <div class="live-top">
          <div class="live-pill">LIVE</div>
        </div>
        <div class="online-count"><span id="onlineCount">247</span> online now</div>
      </div>
    </div>
  </div>

  <div class="chatbox" id="chatbox"></div>

  <div class="quick-actions">
    <button class="q-btn" onclick="quickAsk('အကောင့်ဖွင့်နည်း သိချင်ပါတယ်')">👤 အကောင့်ဖွင့်နည်း</button>
    <button class="q-btn" onclick="quickAsk('ငွေသွင်းနည်း ရှင်းပြပေးပါ')">💰 ငွေသွင်းနည်း</button>
    <button class="q-btn" onclick="quickAsk('အခုရှိတဲ့ ပရိုမိုးရှင်းတွေ ပြောပြပါ')">🎁 ပရိုမိုးရှင်း</button>
    <button class="q-btn" onclick="quickAsk('ဂိမ်းအနိုင်ခန်းများ ကြည့်ချင်ပါတယ်')">🏆 အနိုင်ခန်း</button>
  </div>

  <div class="footer">
    <div class="input-wrap">
      <div class="input-glow"></div>
      <input type="text" id="userInput"
        placeholder="မေးမြန်းလိုသည်များကို ရိုက်ထည့်ပါ..."
        onkeydown="if(event.key==='Enter') handleSend()" />
    </div>
    <button class="send-btn" onclick="handleSend()">➤</button>
  </div>
</div>

<script>
const GROQ_KEY = "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";
let clicks = 0, timer;

/* ── Conversation memory ── */
let chatHistory = [];
const MAX_HISTORY = 20;

/* ── Unread Badge + Title Flash ── */
let unreadCount = 0;
let titleFlashTimer = null;
const originalTitle = "Diamond Support - Secure Cloud";

document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    unreadCount = 0;
    clearInterval(titleFlashTimer);
    titleFlashTimer = null;
    document.title = originalTitle;
  }
});

function notifyUnread() {
  if (document.hidden) {
    unreadCount++;
    let toggle = true;
    if (!titleFlashTimer) {
      titleFlashTimer = setInterval(() => {
        document.title = toggle
          ? `(${unreadCount}) 💬 မက်ဆေ့ ရောက်သည်!`
          : originalTitle;
        toggle = !toggle;
      }, 1000);
    }
    if (Notification.permission === 'granted') {
      new Notification('Diamond Gaming Support', {
        body: 'Bot မှ အဖြေ ရောက်ရှိနေပါသည် 💎',
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💎</text></svg>'
      });
    }
  }
}

function requestNotifPermission() {
  if (Notification.permission === 'default') Notification.requestPermission();
}

/* ── Sound Effect (Web Audio API) ── */
let audioCtx = null;

function playNotifSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1100].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = audioCtx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    });
  } catch(e) {}
}

/* ── Secret admin tap ── */
function secretClick() {
  clicks++;
  clearTimeout(timer);
  if (clicks === 3) { checkPassword(); clicks = 0; }
  timer = setTimeout(() => clicks = 0, 1000);
}
function checkPassword() {
  const pass = prompt("Admin Password ကို ရိုက်ထည့်ပါ:");
  if (pass === "2006") toggleAdmin();
  else if (pass !== null) alert("Password မှားယွင်းနေပါသည်။ Access Denied!");
}
function toggleAdmin() {
  document.getElementById('adminDashboard').classList.toggle('open');
}

/* ── URL detection & link rendering ── */
function linkifyText(text) {
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRegex, url =>
    `<a href="${url}" target="_blank" rel="noopener">${url}</a>`
  );
}

/* ── Timestamp helper ── */
function getTime() {
  const now = new Date();
  return now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });
}

/* ── Add message with optional typewriter ── */
function addMessage(role, text, typewriter = false) {
  const box = document.getElementById('chatbox');

  if (role === 'user') {
    const wrap = document.createElement('div');
    wrap.className = 'user-wrap';
    const bubble = document.createElement('div');
    bubble.className = 'message user';
    bubble.innerHTML = linkifyText(text);
    const ts = document.createElement('div');
    ts.className = 'msg-time';
    ts.textContent = getTime();
    wrap.appendChild(bubble);
    wrap.appendChild(ts);
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
    return bubble;
  }

  // Bot row: avatar + col(bubble + timestamp)
  const row = document.createElement('div');
  row.className = 'bot-row';

  const avatar = document.createElement('div');
  avatar.className = 'bot-avatar';
  avatar.textContent = '💎';

  const col = document.createElement('div');
  col.className = 'bot-col';

  const bubble = document.createElement('div');
  bubble.className = 'message bot';

  const ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.textContent = getTime();

  col.appendChild(bubble);
  col.appendChild(ts);
  row.appendChild(avatar);
  row.appendChild(col);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;

  if (typewriter) {
    bubble.classList.add('typing-cursor');
    let i = 0;
    const tick = () => {
      if (i < text.length) {
        bubble.innerHTML = linkifyText(text.slice(0, ++i));
        box.scrollTop = box.scrollHeight;
        setTimeout(tick, 16);
      } else {
        bubble.classList.remove('typing-cursor');
      }
    };
    setTimeout(tick, 80);
  } else {
    bubble.innerHTML = linkifyText(text);
  }
  return bubble;
}

/* ── Thinking dots ── */
function showThinking() {
  const box = document.getElementById('chatbox');
  const dots = document.createElement('div');
  dots.className = 'thinking';
  dots.id = 'thinking';
  dots.innerHTML = '<span></span><span></span><span></span>';
  box.appendChild(dots);
  box.scrollTop = box.scrollHeight;
}
function hideThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

/* ── Quick ask ── */
function quickAsk(q) {
  document.getElementById('userInput').value = q;
  handleSend();
}

/* ── Send message ── */
async function handleSend() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  const kb = document.getElementById('knowledgeBase').value;
  if (!text) return;

  addMessage("user", text);
  input.value = '';
  showThinking();
  requestNotifPermission();

  // Add to history
  chatHistory.push({ role: "user", content: text });
  if (chatHistory.length > MAX_HISTORY) chatHistory = chatHistory.slice(-MAX_HISTORY);

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROQ_KEY}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          {
            role: "system",
            content: `သင်သည် Diamond Gaming မှ Support ဖြစ်သည်။ အောက်ပါအချက်အလက်များကိုသာ သုံး၍ မြန်မာလို ယဉ်ကျေးစွာ ဖြေပေးပါ။ Customer ၏ အရင်မေးချက်များကို မှတ်မိပြီး context နဲ့ ဆက်ပြောပါ။\n\n${kb}`
          },
          ...chatHistory
        ]
      })
    });

    const data = await response.json();
    const reply = data?.choices?.[0]?.message?.content
      || "တောင်းပန်ပါတယ်၊ အခုချိန်မှာ အဖြေမရနိုင်သေးပါ။";

    // Save bot reply to history
    chatHistory.push({ role: "assistant", content: reply });
    if (chatHistory.length > MAX_HISTORY) chatHistory = chatHistory.slice(-MAX_HISTORY);

    hideThinking();
    addMessage("bot", reply, true);
    playNotifSound();
    notifyUnread();
  } catch (e) {
    hideThinking();
    addMessage("bot", "ချိတ်ဆက်မှု အခက်အခဲရှိနေပါသည်။", true);
    playNotifSound();
    notifyUnread();
  }
}

window.onload = () => {
  addMessage("bot", "မင်္ဂလာပါ! Diamond Gaming Support မှ ကြိုဆိုပါတယ်။ ဘယ်လိုကူညီပေးရမလဲ? 💎", true);

  // Fluctuate online count for live feel
  let base = 230 + Math.floor(Math.random() * 40);
  setInterval(() => {
    base += Math.floor(Math.random() * 7) - 3;
    base = Math.max(180, Math.min(320, base));
    const el = document.getElementById('onlineCount');
    if (el) el.textContent = base;
  }, 4000);
};
